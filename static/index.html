<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lindenmeyer Munroe AI Agent</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1f2937; }

/* ── Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 260px; min-width: 260px;
  background: #fff; border-right: 1px solid #e5e7eb;
  display: flex; flex-direction: column;
  transition: transform 0.25s ease;
  z-index: 100;
}
#sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid #e5e7eb; }
#sidebar-header h1 { font-size: 14px; font-weight: 700; color: #111827; line-height: 1.4; margin-bottom: 12px; }
#new-chat-btn {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid #e5e7eb; background: #fff;
  font-size: 13px; font-weight: 500; color: #374151;
  cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
#new-chat-btn:hover { background: #f9fafb; }

#conversation-list { flex: 1; overflow-y: auto; padding: 8px 8px; }
.conv-section-label { font-size: 11px; font-weight: 600; color: #9ca3af; padding: 8px 8px 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.conv-item {
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: #374151; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: background 0.15s; position: relative;
}
.conv-item:hover { background: #f3f4f6; }
.conv-item.active { background: #eff6ff; color: #1d4ed8; font-weight: 500; }
.conv-item .conv-time { font-size: 11px; color: #9ca3af; display: block; margin-top: 1px; }

#sidebar-footer { padding: 12px 8px; border-top: 1px solid #e5e7eb; }
#archived-toggle { width: 100%; text-align: left; background: none; border: none; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 6px; }
#archived-toggle:hover { background: #f3f4f6; }
#archived-list { display: none; }
#archived-list.open { display: block; }

/* ── Main chat area ── */
#chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fff; }

#chat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 1px solid #e5e7eb;
  background: #fff;
}
#hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; }
#hamburger:hover { background: #f3f4f6; }
#chat-title { font-size: 15px; font-weight: 600; color: #111827; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#messages {
  flex: 1; overflow-y: auto; padding: 24px 20px;
  display: flex; flex-direction: column; gap: 20px;
}

/* Welcome state */
#welcome {
  margin: auto; text-align: center; padding: 40px 20px;
  max-width: 480px;
}
#welcome h2 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 8px; }
#welcome p { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
.suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  padding: 8px 14px; border-radius: 20px; border: 1px solid #e5e7eb;
  background: #f9fafb; font-size: 13px; color: #374151;
  cursor: pointer; transition: all 0.15s;
}
.chip:hover { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

/* Messages */
.msg-row { display: flex; flex-direction: column; max-width: 100%; }
.msg-row.user { align-items: flex-end; }
.msg-row.assistant { align-items: flex-start; }

.bubble {
  padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; max-width: 70%;
}
.msg-row.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
.msg-row.assistant .bubble { background: transparent; padding: 0; max-width: 85%; }

.ai-summary { font-size: 14px; color: #1f2937; line-height: 1.6; margin-bottom: 10px; }

/* SQL toggle */
.sql-toggle {
  font-size: 12px; color: #6b7280; background: none; border: none; cursor: pointer;
  padding: 2px 0; display: flex; align-items: center; gap: 4px; margin-bottom: 6px;
}
.sql-toggle:hover { color: #374151; }
.sql-block {
  display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 10px 12px; font-size: 12px; font-family: 'Menlo', 'Monaco', monospace;
  color: #334155; white-space: pre-wrap; word-break: break-word;
  margin-bottom: 10px; line-height: 1.5;
}
.sql-block.open { display: block; }

/* Result table */
.result-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #e5e7eb; margin-top: 4px; }
.result-table { border-collapse: collapse; font-size: 12.5px; width: 100%; }
.result-table th { background: #f8fafc; padding: 7px 12px; text-align: left; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
.result-table td { padding: 6px 12px; color: #1f2937; border-bottom: 1px solid #f3f4f6; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:hover td { background: #fafafa; }
.result-count { font-size: 11px; color: #9ca3af; margin-top: 5px; }

/* Error message */
.msg-error { font-size: 13.5px; color: #dc2626; line-height: 1.5; }
.msg-clarify { font-size: 13.5px; color: #d97706; line-height: 1.5; }

/* Loading dots */
.loading-dots { display: flex; gap: 4px; padding: 6px 0; align-items: center; }
.loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: #9ca3af; animation: dot-bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }

/* Input area */
#input-area { padding: 14px 20px 18px; border-top: 1px solid #e5e7eb; background: #fff; }
#input-form { display: flex; align-items: flex-end; gap: 8px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 8px 10px; }
#question-input {
  flex: 1; border: none; background: transparent; resize: none;
  font-size: 14px; color: #1f2937; line-height: 1.5;
  max-height: 180px; outline: none; font-family: inherit;
  padding: 2px 0;
}
#question-input::placeholder { color: #9ca3af; }
.input-btn {
  background: none; border: none; cursor: pointer; padding: 4px;
  border-radius: 6px; color: #9ca3af; display: flex; align-items: center;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.input-btn:hover { color: #6b7280; background: #f3f4f6; }
#send-btn {
  background: #2563eb; color: #fff; border: none; border-radius: 8px;
  padding: 6px 10px; cursor: pointer; display: flex; align-items: center;
  font-size: 13px; font-weight: 500; transition: background 0.15s; flex-shrink: 0;
}
#send-btn:hover { background: #1d4ed8; }
#send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
#disclaimer { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 8px; }

/* Overlay for mobile */
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
#sidebar-overlay.open { display: block; }

/* ── Mobile ── */
@media (max-width: 768px) {
  #sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #hamburger { display: flex; }
  .bubble { max-width: 85%; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>Lindenmeyer Munroe<br>AI Agent</h1>
      <button id="new-chat-btn" onclick="newConversation()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>
    <nav id="conversation-list"></nav>
    <div id="sidebar-footer">
      <button id="archived-toggle" onclick="toggleArchived()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 8h14M5 8a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v0a2 2 0 01-2 2M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2L19 8"/></svg>
        Archived Chats
      </button>
      <div id="archived-list"></div>
    </div>
  </aside>

  <!-- Overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <main id="chat-main">
    <div id="chat-header">
      <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="18" height="18" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <span id="chat-title">New conversation</span>
    </div>

    <div id="messages">
      <div id="welcome">
        <h2>How can I help you today?</h2>
        <p>Ask me about Lindenmeyer Munroe's products, inventory levels, pricing, or order history.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendSuggestion(this)">How many 12×18 papers are in stock?</button>
          <button class="chip" onclick="sendSuggestion(this)">Show list prices for 8.5×11 80lb gloss text</button>
          <button class="chip" onclick="sendSuggestion(this)">Which warehouse has the most inventory?</button>
          <button class="chip" onclick="sendSuggestion(this)">Top 5 products by total orders</button>
          <button class="chip" onclick="sendSuggestion(this)">What 24lb bond paper do we carry?</button>
          <button class="chip" onclick="sendSuggestion(this)">Show recent delivered orders</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <form id="input-form" onsubmit="return false;">
        <button type="button" class="input-btn" title="Attach file (coming soon)">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="question-input" rows="1" placeholder="Write a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button type="button" class="input-btn" title="Voice (coming soon)">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0M12 21v-4M8 21h8"/></svg>
        </button>
        <button id="send-btn" type="submit" onclick="submitQuestion()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
      <p id="disclaimer">AI assistants might make mistakes. Check important information.</p>
    </div>
  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'lm_conversations';
const ARCHIVE_DAYS = 7;

let state = {
  conversations: [],
  activeId: null,
  loading: false,
};

// ── localStorage helpers ───────────────────────────────────────────────────
function saveConversations() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.conversations));
}

function loadConversations() {
  try {
    state.conversations = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch {
    state.conversations = [];
  }
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

// ── Conversation management ────────────────────────────────────────────────
function newConversation() {
  const conv = {
    id: uuid(),
    title: 'New conversation',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    archived: false,
    messages: [],
    apiHistory: [],
  };
  state.conversations.unshift(conv);
  saveConversations();
  selectConversation(conv.id);
  closeSidebar();
}

function selectConversation(id) {
  state.activeId = id;
  renderSidebar();
  renderMessages();
  const conv = getActive();
  document.getElementById('chat-title').textContent = conv ? conv.title : 'New conversation';
}

function getActive() {
  return state.conversations.find(c => c.id === state.activeId) || null;
}

// ── Sidebar rendering ──────────────────────────────────────────────────────
function renderSidebar() {
  const now = Date.now();
  const recent = state.conversations.filter(c => !c.archived && (now - new Date(c.updatedAt).getTime()) < ARCHIVE_DAYS * 86400000);
  const archived = state.conversations.filter(c => c.archived || (now - new Date(c.updatedAt).getTime()) >= ARCHIVE_DAYS * 86400000);

  document.getElementById('conversation-list').innerHTML = recent.map(c => convItemHTML(c)).join('');
  document.getElementById('archived-list').innerHTML = archived.map(c => convItemHTML(c)).join('');
}

function convItemHTML(c) {
  const active = c.id === state.activeId ? 'active' : '';
  return `<div class="conv-item ${active}" onclick="selectConversation('${c.id}')">
    ${escHtml(c.title)}
    <span class="conv-time">${relativeTime(c.updatedAt)}</span>
  </div>`;
}

// ── Messages rendering ─────────────────────────────────────────────────────
function renderMessages() {
  const conv = getActive();
  const container = document.getElementById('messages');

  if (!conv || conv.messages.length === 0) {
    container.innerHTML = `<div id="welcome">
      <h2>How can I help you today?</h2>
      <p>Ask me about Lindenmeyer Munroe's products, inventory levels, pricing, or order history.</p>
      <div class="suggestion-chips">
        <button class="chip" onclick="sendSuggestion(this)">How many 12×18 papers are in stock?</button>
        <button class="chip" onclick="sendSuggestion(this)">Show list prices for 8.5×11 80lb gloss text</button>
        <button class="chip" onclick="sendSuggestion(this)">Which warehouse has the most inventory?</button>
        <button class="chip" onclick="sendSuggestion(this)">Top 5 products by total orders</button>
        <button class="chip" onclick="sendSuggestion(this)">What 24lb bond paper do we carry?</button>
        <button class="chip" onclick="sendSuggestion(this)">Show recent delivered orders</button>
      </div>
    </div>`;
    return;
  }

  container.innerHTML = conv.messages.map((msg, i) => renderMessage(msg, i)).join('');
  container.scrollTop = container.scrollHeight;
}

function renderMessage(msg, idx) {
  if (msg.role === 'user') {
    return `<div class="msg-row user">
      <div class="bubble">${escHtml(msg.content)}</div>
    </div>`;
  }

  // Assistant message
  let inner = '';

  if (msg.error) {
    const cls = msg.clarify ? 'msg-clarify' : 'msg-error';
    inner = `<p class="${cls}">${escHtml(msg.content)}</p>`;
  } else {
    inner += `<div class="ai-summary">${escHtml(msg.content)}</div>`;

    if (msg.sql) {
      inner += `<button class="sql-toggle" onclick="toggleSQL(${idx})">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        View SQL
      </button>
      <div class="sql-block" id="sql-${idx}">${escHtml(msg.sql)}</div>`;
    }

    if (msg.columns && msg.rows && msg.rows.length > 0) {
      inner += renderTable(msg.columns, msg.rows);
    } else if (msg.columns && msg.rows && msg.rows.length === 0) {
      inner += `<p class="result-count">No results found.</p>`;
    }
  }

  return `<div class="msg-row assistant"><div class="bubble">${inner}</div></div>`;
}

function renderTable(columns, rows) {
  const ths = columns.map(c => `<th>${escHtml(String(c))}</th>`).join('');
  const trs = rows.map(row =>
    `<tr>${row.map(cell => `<td>${escHtml(cell == null ? '' : String(cell))}</td>`).join('')}</tr>`
  ).join('');
  return `<div class="result-wrap">
    <table class="result-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
  </div>
  <p class="result-count">${rows.length} row${rows.length !== 1 ? 's' : ''}</p>`;
}

function toggleSQL(idx) {
  const block = document.getElementById(`sql-${idx}`);
  if (block) block.classList.toggle('open');
}

// ── Sending messages ───────────────────────────────────────────────────────
function sendSuggestion(btn) {
  document.getElementById('question-input').value = btn.textContent.trim();
  submitQuestion();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitQuestion();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

async function submitQuestion() {
  if (state.loading) return;
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question) return;

  // Ensure there's an active conversation
  if (!state.activeId) newConversation();
  const conv = getActive();

  input.value = '';
  input.style.height = 'auto';
  setLoading(true);

  // Add user message
  conv.messages.push({ role: 'user', content: question });
  conv.updatedAt = new Date().toISOString();
  if (conv.messages.length === 1) {
    conv.title = question.slice(0, 45) + (question.length > 45 ? '…' : '');
    document.getElementById('chat-title').textContent = conv.title;
  }
  saveConversations();
  renderMessages();
  appendLoadingDots();

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history: conv.apiHistory }),
    });

    const data = await res.json();

    if (res.ok) {
      // Success
      conv.messages.push({
        role: 'assistant',
        content: data.summary,
        sql: data.query,
        columns: data.columns,
        rows: data.result,
      });
      conv.apiHistory = data.history;
    } else {
      // Error from API
      const detail = data.detail || {};
      const errMsg = typeof detail === 'string' ? detail : (detail.error || 'Something went wrong.');
      const isClarify = errMsg.startsWith('CLARIFY:') || (res.status === 422 && !errMsg.includes('cannot'));
      conv.messages.push({
        role: 'assistant',
        content: isClarify ? errMsg.replace(/^CLARIFY:\s*/i, '') : errMsg,
        error: true,
        clarify: isClarify,
      });
      if (detail.history) conv.apiHistory = detail.history;
    }
  } catch (err) {
    conv.messages.push({
      role: 'assistant',
      content: 'Network error — please check your connection and try again.',
      error: true,
    });
  }

  conv.updatedAt = new Date().toISOString();
  saveConversations();
  setLoading(false);
  renderSidebar();
  renderMessages();
}

function appendLoadingDots() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'loading-row';
  row.innerHTML = `<div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function setLoading(on) {
  state.loading = on;
  document.getElementById('send-btn').disabled = on;
  const row = document.getElementById('loading-row');
  if (row) row.remove();
}

// ── Sidebar toggle (mobile) ────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
function toggleArchived() {
  document.getElementById('archived-list').classList.toggle('open');
}

// ── Utility ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

// ── Init ───────────────────────────────────────────────────────────────────
loadConversations();
renderSidebar();
if (state.conversations.length > 0) {
  selectConversation(state.conversations[0].id);
} else {
  renderMessages();
}
</script>
</body>
</html>
