<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lindenmeyr AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1A4B8C;
      --blue-light:  #2563C4;
      --blue-user:   #1E4FAF;
      --gray-bg:     #F4F6F9;
      --gray-border: #DDE1E9;
      --gray-text:   #6B7280;
      --text:        #1C2333;
      --white:       #FFFFFF;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono:        'Consolas', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--gray-bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Page layout ────────────────────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: var(--blue);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.02em;
    }

    .header-badge {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    /* ── Chat area ──────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      align-self: stretch;
    }

    /* ── Welcome screen ─────────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 24px;
      padding: 48px 24px;
      text-align: center;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: var(--blue);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .welcome p {
      font-size: 14px;
      color: var(--gray-text);
      max-width: 420px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .chip:hover {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(37, 99, 196, 0.08);
    }

    /* ── Messages ───────────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
    }

    .avatar.ai-avatar {
      background: var(--blue);
      color: #fff;
    }

    .avatar.user-avatar {
      background: #E2E8F0;
      color: var(--text);
    }

    /* Bubble */
    .bubble {
      max-width: 72%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg.user .bubble {
      align-items: flex-end;
    }

    .bubble-text {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.user .bubble-text {
      background: var(--blue-user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble-text {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--gray-border);
      border-bottom-left-radius: 4px;
      width: 100%;
      max-width: 680px;
    }

    .msg.ai .bubble {
      max-width: 100%;
    }

    /* ── SQL toggle ─────────────────────────────────────────────────── */
    .sql-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-text);
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .sql-toggle:hover { color: var(--blue-light); }

    .sql-arrow {
      font-size: 9px;
      transition: transform 0.15s;
      display: inline-block;
    }

    .sql-arrow.open { transform: rotate(90deg); }

    .sql-block {
      display: none;
      background: #F0F4FA;
      border: 1px solid var(--gray-border);
      border-left: 3px solid var(--blue-light);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      width: 100%;
    }

    .sql-block.open { display: block; }

    /* ── Result table ───────────────────────────────────────────────── */
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    thead th {
      background: #EBF0F8;
      padding: 9px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--gray-border);
      white-space: nowrap;
    }

    tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid #EEF1F6;
      color: var(--text);
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: #F8FAFD; }
    tbody tr:hover td { background: #EBF0F8; }

    .null-cell { color: var(--gray-text); font-style: italic; }

    .row-count {
      font-size: 11px;
      color: var(--gray-text);
      margin-top: 4px;
    }

    /* ── Bubble footer (actions) ────────────────────────────────────── */
    .bubble-footer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .copy-btn {
      font-size: 12px;
      color: var(--gray-text);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.1s;
    }

    .copy-btn:hover { color: var(--blue-light); }
    .copy-btn.done  { color: #16A34A; }

    /* ── Loading dots ───────────────────────────────────────────────── */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--blue-light);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1;   }
    }

    /* ── Error ──────────────────────────────────────────────────────── */
    .error-bubble {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #B91C1C;
    }

    /* ── Empty result ───────────────────────────────────────────────── */
    .no-results {
      font-size: 13px;
      color: var(--gray-text);
      font-style: italic;
    }

    /* ── Input area ─────────────────────────────────────────────────── */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--gray-border);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 24px;
      padding: 6px 6px 6px 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-inner:focus-within {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(37, 99, 196, 0.1);
    }

    #question {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      padding: 6px 0;
    }

    #question::placeholder { color: #A0AAB8; }

    #send {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 13px;
      font-family: var(--font);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #send:hover:not(:disabled) { background: var(--blue-light); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #B0B8C8;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">📦</div>
      <div class="header-text">
        <h1>Lindenmeyr AI Assistant</h1>
        <p>Internal Operations Data Assistant</p>
      </div>
    </div>
    <div class="header-badge">Internal Use Only</div>
  </header>

  <!-- Chat feed -->
  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📦</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything about inventory, orders, employees, or operations data.</p>
      <div class="welcome-chips">
        <button class="chip" onclick="suggest(this)">Check inventory levels</button>
        <button class="chip" onclick="suggest(this)">Find product availability</button>
        <button class="chip" onclick="suggest(this)">Show recent orders</button>
        <button class="chip" onclick="suggest(this)">Warehouse stock levels</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-inner">
      <input id="question" type="text" placeholder="Ask about inventory, orders, or operations..." autocomplete="off" />
      <button id="send">Send</button>
    </div>
    <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Results pulled live from your database</div>
  </div>

</div>

<script>
  const chat    = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  const input   = document.getElementById('question');
  const sendBtn = document.getElementById('send');

  let history = [];
  let msgCount = 0;

  /* ── Suggest ─────────────────────────────────────────────────────── */
  function suggest(btn) {
    input.value = btn.textContent.trim();
    input.focus();
  }

  /* ── Escape HTML ─────────────────────────────────────────────────── */
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Scroll to bottom ────────────────────────────────────────────── */
  function scrollDown() {
    chat.scrollTop = chat.scrollHeight;
  }

  /* ── Render table ────────────────────────────────────────────────── */
  function renderTable(rows) {
    if (!rows || rows.length === 0) {
      return '<div class="no-results">No records found.</div>';
    }
    const cols = rows[0].length;
    let html = '<div class="table-scroll"><table><thead><tr>';
    for (let i = 0; i < cols; i++) html += `<th>Column ${i + 1}</th>`;
    html += '</tr></thead><tbody>';
    for (const row of rows) {
      html += '<tr>';
      for (const cell of row) {
        html += cell === null
          ? '<td><span class="null-cell">—</span></td>'
          : `<td>${esc(cell)}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    html += `<div class="row-count">${rows.length} record${rows.length !== 1 ? 's' : ''} returned</div>`;
    return html;
  }

  /* ── Add user message ────────────────────────────────────────────── */
  function addUser(text) {
    if (welcome) welcome.style.display = 'none';
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="avatar user-avatar">You</div>
      <div class="bubble">
        <div class="bubble-text">${esc(text)}</div>
      </div>`;
    chat.appendChild(el);
    scrollDown();
  }

  /* ── Add AI typing placeholder ───────────────────────────────────── */
  function addTyping() {
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.id = 'typing-' + (++msgCount);
    el.innerHTML = `
      <div class="avatar ai-avatar">LM</div>
      <div class="bubble">
        <div class="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>`;
    chat.appendChild(el);
    scrollDown();
    return el;
  }

  /* ── Replace typing with real response ───────────────────────────── */
  function fillResponse(el, sqlQuery, rows) {
    const sqlId  = 'sql-'  + Date.now();
    const copyId = 'copy-' + Date.now();
    el.innerHTML = `
      <div class="avatar ai-avatar">LM</div>
      <div class="bubble">
        <div class="bubble-text">
          <div class="bubble-footer" style="margin-bottom:10px;">
            <span class="sql-toggle" onclick="toggleSql('${sqlId}',this)">
              <span class="sql-arrow">▶</span> View SQL query
            </span>
            <button class="copy-btn" id="${copyId}" onclick="copyRows('${copyId}',${JSON.stringify(JSON.stringify(rows))})">
              ⎘ Copy data
            </button>
          </div>
          <pre class="sql-block" id="${sqlId}">${esc(sqlQuery)}</pre>
          ${renderTable(rows)}
        </div>
      </div>`;
    scrollDown();
  }

  /* ── Replace typing with error ───────────────────────────────────── */
  function fillError(el, msg) {
    el.innerHTML = `
      <div class="avatar ai-avatar">LM</div>
      <div class="bubble">
        <div class="error-bubble">${esc(String(msg))}</div>
      </div>`;
    scrollDown();
  }

  /* ── SQL toggle ──────────────────────────────────────────────────── */
  function toggleSql(id, toggleEl) {
    const block = document.getElementById(id);
    const arrow = toggleEl.querySelector('.sql-arrow');
    block.classList.toggle('open');
    arrow.classList.toggle('open');
  }

  /* ── Copy rows ───────────────────────────────────────────────────── */
  function copyRows(btnId, json) {
    const rows = JSON.parse(json);
    const text = rows.map(r => r.join('\t')).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(btnId);
      btn.textContent = '✓ Copied';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = '⎘ Copy data'; btn.classList.remove('done'); }, 2000);
    });
  }

  /* ── Send ────────────────────────────────────────────────────────── */
  async function send() {
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    sendBtn.disabled = true;
    addUser(question);
    const typingEl = addTyping();

    try {
      const res  = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history }),
      });
      const data = await res.json();

      if (!res.ok) {
        const err = data.detail?.error || data.detail || 'Something went wrong.';
        fillError(typingEl, err);
        if (data.detail?.history) history = data.detail.history;
      } else {
        history = data.history;
        fillResponse(typingEl, data.query, data.result);
      }
    } catch (e) {
      fillError(typingEl, 'Network error: ' + e.message);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
