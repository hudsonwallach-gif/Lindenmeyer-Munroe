<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lindenmeyr AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1A3A5C;
      --navy-dark:  #122840;
      --blue:       #2563C4;
      --bg:         #F7F8FA;
      --white:      #FFFFFF;
      --border:     #E2E6ED;
      --text:       #1C2333;
      --muted:      #6B7A90;
      --user-bg:    #E8EEF8;
      --font:       'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono:       'Consolas', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      background: var(--navy);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lm-mark {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.03em;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 1px;
    }

    .header-pill {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Chat feed ───────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Welcome ─────────────────────────────────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 20px;
      text-align: center;
    }

    .welcome-logo {
      width: 52px;
      height: 52px;
      background: var(--navy);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.03em;
    }

    #welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    #welcome p {
      font-size: 14px;
      color: var(--muted);
      max-width: 380px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .chip {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .chip:hover { border-color: var(--blue); }

    /* ── Messages ────────────────────────────────────────────────────── */
    .turn {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .turn:last-child { border-bottom: none; }

    .turn-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* User turn */
    .turn.user .turn-inner {
      display: flex;
      justify-content: flex-end;
    }

    .user-bubble {
      background: var(--user-bg);
      border: 1px solid #D0DAF0;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 18px;
      font-size: 15px;
      color: var(--text);
      max-width: 80%;
    }

    /* AI turn */
    .turn.ai {
      background: var(--white);
    }

    .ai-inner {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .ai-avatar {
      width: 30px;
      height: 30px;
      background: var(--navy);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .ai-body {
      flex: 1;
      min-width: 0;
    }

    .ai-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .ai-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* SQL disclosure */
    .sql-disclosure {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .sql-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg);
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: var(--muted);
      transition: background 0.1s;
    }

    .sql-toggle:hover { background: #ECEEF2; }

    .sql-arrow {
      font-size: 9px;
      transition: transform 0.15s;
      display: inline-block;
    }

    .sql-arrow.open { transform: rotate(90deg); }

    .sql-code {
      display: none;
      background: #F3F5F8;
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    .sql-code.open { display: block; }

    /* ── Typing indicator ────────────────────────────────────────────── */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Error ───────────────────────────────────────────────────────── */
    .error-text {
      color: #B91C1C;
      font-size: 14px;
    }

    /* ── Input area ──────────────────────────────────────────────────── */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px 24px 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,196,0.08);
    }

    #question {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 13px 16px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      resize: none;
    }

    #question::placeholder { color: #A8B0C0; }

    #send {
      margin: 6px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send:hover:not(:disabled) { background: var(--blue); }
    #send:disabled { opacity: 0.35; cursor: not-allowed; }

    #send svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #B0B8C8;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="lm-mark">LM</div>
      <div>
        <div class="header-title">Lindenmeyr AI Assistant</div>
        <div class="header-sub">Internal Operations Data Assistant</div>
      </div>
    </div>
    <div class="header-pill">Internal Use Only</div>
  </header>

  <!-- Chat -->
  <div id="chat">
    <div id="welcome">
      <div class="welcome-logo">LM</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything about employees, orders, inventory, or operations data.</p>
      <div class="chips">
        <button class="chip" onclick="suggest(this)">Who are our top salespeople?</button>
        <button class="chip" onclick="suggest(this)">Show all employees in Engineering</button>
        <button class="chip" onclick="suggest(this)">What departments do we have?</button>
        <button class="chip" onclick="suggest(this)">Show recent sales</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input id="question" type="text" placeholder="Ask about operations, inventory, or company data..." autocomplete="off" />
      <button id="send" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send</div>
  </div>

</div>
<script>
  const chatEl  = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  const input   = document.getElementById('question');
  const sendBtn = document.getElementById('send');

  let history = [];
  let idCount = 0;

  function uid() { return 'id-' + (++idCount); }

  function scrollDown() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function suggest(btn) {
    input.value = btn.textContent.trim();
    input.focus();
  }

  function hideWelcome() {
    if (welcome) welcome.style.display = 'none';
  }

  /* Add a user turn */
  function addUser(text) {
    hideWelcome();
    const el = document.createElement('div');
    el.className = 'turn user';
    el.innerHTML = `<div class="turn-inner"><div class="user-bubble">${esc(text)}</div></div>`;
    chatEl.appendChild(el);
    scrollDown();
  }

  /* Add a blank AI turn (returns the body el to populate later) */
  function addAiShell() {
    const el = document.createElement('div');
    el.className = 'turn ai';
    const bodyId = uid();
    el.innerHTML = `
      <div class="turn-inner">
        <div class="ai-inner">
          <div class="ai-avatar">LM</div>
          <div class="ai-body" id="${bodyId}">
            <div class="ai-name">Lindenmeyr Assistant</div>
            <div class="typing-dots">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
          </div>
        </div>
      </div>`;
    chatEl.appendChild(el);
    scrollDown();
    return document.getElementById(bodyId);
  }

  /* Fill AI body with answer */
  function fillAi(bodyEl, answer, sql) {
    const sqlId   = uid();
    const arrowId = uid();
    bodyEl.innerHTML = `
      <div class="ai-name">Lindenmeyr Assistant</div>
      <div class="ai-text">${esc(answer)}</div>
      <div class="sql-disclosure">
        <div class="sql-toggle" onclick="toggleSql('${sqlId}','${arrowId}')">
          <span class="sql-arrow" id="${arrowId}">▶</span>
          <span>View database query</span>
        </div>
        <pre class="sql-code" id="${sqlId}">${esc(sql)}</pre>
      </div>`;
    scrollDown();
  }

  /* Fill AI body with error */
  function fillError(bodyEl, msg) {
    bodyEl.innerHTML = `
      <div class="ai-name">Lindenmeyr Assistant</div>
      <div class="error-text">${esc(String(msg))}</div>`;
    scrollDown();
  }

  /* Toggle SQL block */
  function toggleSql(sqlId, arrowId) {
    document.getElementById(sqlId).classList.toggle('open');
    document.getElementById(arrowId).classList.toggle('open');
  }

  /* Send */
  async function send() {
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    sendBtn.disabled = true;

    addUser(question);
    const bodyEl = addAiShell();

    try {
      const res  = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history }),
      });
      const data = await res.json();

      if (!res.ok) {
        const msg = data.detail?.error || data.detail || 'Something went wrong.';
        fillError(bodyEl, msg);
      } else {
        history = data.history;
        fillAi(bodyEl, data.answer, data.sql);
      }
    } catch (e) {
      fillError(bodyEl, 'Network error: ' + e.message);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
