services:
  - type: web
    name: lindenmeyer-munroe-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lm-postgres
          property: connectionString

databases:
  - name: lm-postgres
    databaseName: lindenmeyer_munroe
    plan: free
    postgresMajorVersion: 16
